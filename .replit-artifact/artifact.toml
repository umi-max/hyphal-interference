kind = "video"
previewPath = "/hyphal-interference/"
title = "Hyphal Interference"
version = "1.0.0"
id = "artifacts/hyphal-interference"
router = "path"

[[integratedSkills]]
name = "video-js"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/hyphal-interference/" ]
localPort = 22872

[services.development]
run = "pnpm --filter @workspace/hyphal-interference run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/hyphal-interference", "run", "build" ]
publicDir = "artifacts/hyphal-interference/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22872"
BASE_PATH = "/hyphal-interference/"
